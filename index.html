<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:#111;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:40px 20px;}
  h1{color:#fff;font-size:28px;font-weight:700;margin-bottom:6px;}
  .sub{color:#666;font-size:14px;margin-bottom:32px;}
  .controls{display:flex;gap:12px;align-items:center;margin-bottom:32px;flex-wrap:wrap;justify-content:center;}
  .btn{padding:10px 22px;border-radius:10px;border:1px solid #333;background:#1a1a1a;color:#ccc;font-family:'Inter';font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;}
  .btn:hover{background:#222;border-color:#555;color:#fff;}
  .btn.active{background:#fff;color:#111;border-color:#fff;}
  .picker-wrap{display:flex;align-items:center;gap:10px;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:8px 14px;}
  .picker-wrap label{color:#888;font-size:13px;}
  input[type=color]{width:40px;height:30px;border:none;border-radius:6px;cursor:pointer;padding:0;background:none;}
  .palette{display:flex;width:100%;max-width:900px;border-radius:20px;overflow:hidden;height:300px;box-shadow:0 20px 60px rgba(0,0,0,0.5);margin-bottom:24px;}
  .swatch{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:16px 12px;cursor:pointer;transition:flex 0.3s ease;position:relative;}
  .swatch:hover{flex:1.8;}
  .swatch-info{opacity:0;transition:opacity 0.2s;text-align:center;}
  .swatch:hover .swatch-info{opacity:1;}
  .swatch-hex{color:rgba(0,0,0,0.7);font-size:13px;font-weight:600;font-family:'Inter';}
  .swatch-hex.light{color:rgba(255,255,255,0.8);}
  .copy-hint{font-size:11px;color:rgba(0,0,0,0.4);margin-top:2px;}
  .copy-hint.light{color:rgba(255,255,255,0.5);}
  .copied-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none;}
  .codes{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:900px;}
  .code-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px 18px;min-width:140px;cursor:pointer;transition:all 0.2s;}
  .code-card:hover{background:#222;border-color:#444;}
  .code-hex{font-size:16px;font-weight:600;color:#fff;font-family:'JetBrains Mono',monospace;}
  .code-label{font-size:11px;color:#555;margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
  .scheme-label{color:#555;font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;}
</style>
</head>
<body>
<h1>🎨 Color Palette Generator</h1>
<p class="sub">Generate beautiful color palettes. Click any color to copy.</p>
<div class="controls">
  <div class="picker-wrap">
    <label>Base Color</label>
    <input type="color" id="baseColor" value="#6c47ff" oninput="generate()">
  </div>
  <button class="btn active" id="analogous" onclick="setScheme('analogous',this)">Analogous</button>
  <button class="btn" id="complementary" onclick="setScheme('complementary',this)">Complementary</button>
  <button class="btn" id="triadic" onclick="setScheme('triadic',this)">Triadic</button>
  <button class="btn" id="monochromatic" onclick="setScheme('monochromatic',this)">Monochromatic</button>
  <button class="btn" onclick="randomColor()">🎲 Random</button>
</div>
<div class="scheme-label" id="schemeLabel">Analogous Palette</div>
<div class="palette" id="palette"></div>
<div class="codes" id="codes"></div>
<div class="copied-toast" id="toast">Copied!</div>
<script>
  let scheme='analogous';
  function hslToHex(h,s,l){
    s/=100;l/=100;const a=s*Math.min(l,1-l);
    const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
    return '#'+f(0)+f(8)+f(4);
  }
  function hexToHsl(hex){
    let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;
    if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;}h*=60;}
    return{h,s:s*100,l:l*100};
  }
  function isLight(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>128;}
  function setScheme(s,btn){scheme=s;document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');generate();}
  function randomColor(){document.getElementById('baseColor').value='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');generate();}
  function generate(){
    const hex=document.getElementById('baseColor').value;
    const{h,s,l}=hexToHsl(hex);
    let colors=[];
    const schemes={
      analogous:[hslToHex((h-40+360)%360,s,l),hslToHex((h-20+360)%360,s,l),hex,hslToHex((h+20)%360,s,l),hslToHex((h+40)%360,s,l)],
      complementary:[hslToHex(h,s,Math.min(90,l+20)),hex,hslToHex(h,s,Math.max(10,l-20)),hslToHex((h+180)%360,s,Math.max(10,l-10)),hslToHex((h+180)%360,s,l)],
      triadic:[hex,hslToHex((h+120)%360,s,l),hslToHex((h+240)%360,s,l),hslToHex((h+60)%360,s,Math.min(90,l+15)),hslToHex((h+300)%360,s,Math.max(10,l-15))],
      monochromatic:[hslToHex(h,s,Math.min(95,l+30)),hslToHex(h,s,Math.min(90,l+15)),hex,hslToHex(h,s,Math.max(5,l-20)),hslToHex(h,s,Math.max(5,l-40))]
    };
    colors=schemes[scheme];
    const labels={analogous:'Analogous Palette',complementary:'Complementary Palette',triadic:'Triadic Palette',monochromatic:'Monochromatic Palette'};
    document.getElementById('schemeLabel').textContent=labels[scheme];
    const p=document.getElementById('palette');
    p.innerHTML=colors.map(c=>{
      const light=isLight(c);
      return `<div class="swatch" style="background:${c}" onclick="copyColor('${c}')">
        <div class="swatch-info">
          <div class="swatch-hex ${light?'':'light'}">${c.toUpperCase()}</div>
          <div class="copy-hint ${light?'':'light'}">Click to copy</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('codes').innerHTML=colors.map((c,i)=>`
      <div class="code-card" onclick="copyColor('${c}')">
        <div style="width:28px;height:28px;border-radius:6px;background:${c};margin-bottom:8px;border:1px solid rgba(255,255,255,0.1)"></div>
        <div class="code-hex">${c.toUpperCase()}</div>
        <div class="code-label">Color ${i+1}</div>
      </div>`).join('');
  }
  function copyColor(c){
    navigator.clipboard.writeText(c);
    const t=document.getElementById('toast');t.textContent=c+' copied!';t.style.display='block';
    setTimeout(()=>t.style.display='none',2000);
  }
  generate();
</script>
</body>
</html>
